<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#feca57"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#skyGrad)"/>
  
  <!-- Setting sun -->
  <circle cx="400" cy="450" r="80" fill="url(#sunGrad)" opacity="0.9"/>
  
  <!-- Sun rays -->
  <g stroke="#feca57" stroke-width="2" opacity="0.6">
    <line x1="400" y1="350" x2="400" y2="300"/>
    <line x1="480" y1="380" x2="520" y2="340"/>
    <line x1="320" y1="380" x2="280" y2="340"/>
    <line x1="500" y1="430" x2="560" y2="420"/>
    <line x1="300" y1="430" x2="240" y2="420"/>
  </g>
  
  <!-- Mountains silhouette -->
  <polygon points="0,600 150,400 300,500 450,350 600,480 750,380 800,450 800,600" fill="#0a0a15"/>
  
  <!-- Cherry blossom petals -->
  <g fill="#ffb7c5" opacity="0.8">
    <ellipse cx="100" cy="150" rx="8" ry="12" transform="rotate(15 100 150)"/>
    <ellipse cx="700" cy="200" rx="6" ry="10" transform="rotate(-20 700 200)"/>
    <ellipse cx="200" cy="100" rx="7" ry="11" transform="rotate(30 200 100)"/>
    <ellipse cx="600" cy="120" rx="5" ry="9" transform="rotate(-10 600 120)"/>
    <ellipse cx="350" cy="80" rx="8" ry="12" transform="rotate(45 350 80)"/>
  </g>
  
  <!-- Title text -->
  <text x="400" y="250" font-family="serif" font-size="48" fill="#e8e8e8" text-anchor="middle" font-weight="bold">
    闭幕式
  </text>
  <text x="400" y="290" font-family="serif" font-size="20" fill="#a0a0a0" text-anchor="middle">
    3月12日 · 春天悄悄闭幕
  </text>
  
  <!-- Decorative line -->
  <line x1="250" y1="310" x2="550" y2="310" stroke="#feca57" stroke-width="1" opacity="0.5"/>
  
  <!-- Footer quote -->
  <text x="400" y="550" font-family="serif" font-size="14" fill="#666" text-anchor="middle" font-style="italic">
    "每一个闭幕，都是另一个开幕的前奏"
  </text>
</svg>