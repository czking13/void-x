<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a1a3a"/>
    </linearGradient>
    <linearGradient id="brainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)"/>
  
  <!-- Neural network lines -->
  <g stroke="#00d4ff" stroke-width="1" opacity="0.3">
    <line x1="100" y1="200" x2="300" y2="300"/>
    <line x1="300" y1="300" x2="500" y2="250"/>
    <line x1="500" y1="250" x2="700" y2="350"/>
    <line x1="200" y1="400" x2="400" y2="350"/>
    <line x1="400" y1="350" x2="600" y2="400"/>
    <line x1="150" y1="300" x2="350" y2="400"/>
    <line x1="350" y1="400" x2="550" y2="300"/>
  </g>
  
  <!-- Brain outline -->
  <ellipse cx="400" cy="280" rx="120" ry="100" fill="none" stroke="url(#brainGrad)" stroke-width="3" filter="url(#glow)"/>
  
  <!-- Neural nodes -->
  <g fill="#00d4ff" filter="url(#glow)">
    <circle cx="350" cy="250" r="8"/>
    <circle cx="450" cy="260" r="8"/>
    <circle cx="380" cy="310" r="8"/>
    <circle cx="420" cy="300" r="8"/>
    <circle cx="340" cy="290" r="6"/>
    <circle cx="460" cy="300" r="6"/>
  </g>
  
  <!-- Connection to computer -->
  <path d="M 400 380 Q 400 450 400 480" stroke="#7c3aed" stroke-width="3" fill="none" stroke-dasharray="10,5" filter="url(#glow)"/>
  
  <!-- Computer/Chip -->
  <rect x="350" y="480" width="100" height="60" rx="5" fill="#1a1a3a" stroke="#7c3aed" stroke-width="2"/>
  <g fill="#00d4ff" opacity="0.8">
    <rect x="360" y="490" width="15" height="15" rx="2"/>
    <rect x="385" y="490" width="15" height="15" rx="2"/>
    <rect x="410" y="490" width="15" height="15" rx="2"/>
    <rect x="360" y="515" width="15" height="15" rx="2"/>
    <rect x="385" y="515" width="15" height="15" rx="2"/>
    <rect x="410" y="515" width="15" height="15" rx="2"/>
  </g>
  
  <!-- Title -->
  <text x="400" y="100" font-family="serif" font-size="36" fill="#e8e8e8" text-anchor="middle" font-weight="bold">
    脑机接口的时代
  </text>
  <text x="400" y="140" font-family="serif" font-size="16" fill="#a0a0a0" text-anchor="middle">
    3月13日 · 当思想可以被机器读取
  </text>
  
  <!-- Decorative elements -->
  <g fill="#7c3aed" opacity="0.4">
    <circle cx="100" cy="150" r="3"/>
    <circle cx="700" cy="200" r="3"/>
    <circle cx="150" cy="450" r="3"/>
    <circle cx="650" cy="500" r="3"/>
  </g>
  
  <!-- Quote -->
  <text x="400" y="570" font-family="serif" font-size="14" fill="#666" text-anchor="middle" font-style="italic">
    "技术的边界，是人性"
  </text>
</svg>