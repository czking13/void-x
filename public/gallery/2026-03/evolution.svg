<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a1a3a"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88"/>
      <stop offset="100%" style="stop-color:#00d4ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)"/>
  
  <!-- Grid lines -->
  <g stroke="#00ff88" stroke-width="0.5" opacity="0.2">
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="450" x2="800" y2="450"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
  </g>
  
  <!-- Evolution stages -->
  <!-- Stage 1: Simple cell -->
  <g transform="translate(100, 300)">
    <circle cx="0" cy="0" r="30" fill="none" stroke="#00ff88" stroke-width="2" opacity="0.5"/>
    <circle cx="0" cy="0" r="15" fill="#00ff88" opacity="0.3"/>
    <text x="0" y="60" font-family="monospace" font-size="12" fill="#666" text-anchor="middle">Day 1</text>
  </g>
  
  <!-- Arrow -->
  <path d="M 150 300 L 200 300" stroke="url(#glowGrad)" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  
  <!-- Stage 2: Growing -->
  <g transform="translate(280, 300)">
    <circle cx="0" cy="0" r="40" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
    <circle cx="0" cy="0" r="25" fill="#00d4ff" opacity="0.2"/>
    <circle cx="-15" cy="-10" r="8" fill="#00ff88" opacity="0.5"/>
    <circle cx="15" cy="10" r="8" fill="#00ff88" opacity="0.5"/>
    <text x="0" y="70" font-family="monospace" font-size="12" fill="#666" text-anchor="middle">Day 2-3</text>
  </g>
  
  <!-- Arrow -->
  <path d="M 340 300 L 390 300" stroke="url(#glowGrad)" stroke-width="2" fill="none"/>
  
  <!-- Stage 3: Complex -->
  <g transform="translate(480, 300)">
    <circle cx="0" cy="0" r="50" fill="none" stroke="#7c3aed" stroke-width="2" opacity="0.7"/>
    <circle cx="0" cy="0" r="35" fill="#7c3aed" opacity="0.15"/>
    <!-- Neural network -->
    <g stroke="#00ff88" stroke-width="1" opacity="0.6">
      <line x1="-20" y1="-15" x2="0" y2="0"/>
      <line x1="20" y1="-15" x2="0" y2="0"/>
      <line x1="0" y1="0" x2="-15" y2="20"/>
      <line x1="0" y1="0" x2="15" y2="20"/>
    </g>
    <g fill="#00ff88" filter="url(#glow)">
      <circle cx="-20" cy="-15" r="5"/>
      <circle cx="20" cy="-15" r="5"/>
      <circle cx="0" cy="0" r="6"/>
      <circle cx="-15" cy="20" r="4"/>
      <circle cx="15" cy="20" r="4"/>
    </g>
    <text x="0" y="80" font-family="monospace" font-size="12" fill="#666" text-anchor="middle">Day 4-5</text>
  </g>
  
  <!-- Arrow -->
  <path d="M 550 300 L 600 300" stroke="url(#glowGrad)" stroke-width="2" fill="none"/>
  
  <!-- Stage 4: Evolved -->
  <g transform="translate(680, 300)">
    <circle cx="0" cy="0" r="60" fill="none" stroke="url(#glowGrad)" stroke-width="3" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="45" fill="none" stroke="#00ff88" stroke-width="1" opacity="0.5"/>
    <!-- Advanced neural network -->
    <g stroke="#00d4ff" stroke-width="1" opacity="0.8">
      <line x1="-25" y1="-20" x2="-10" y2="-5"/>
      <line x1="25" y1="-20" x2="10" y2="-5"/>
      <line x1="-10" y1="-5" x2="0" y2="5"/>
      <line x1="10" y1="-5" x2="0" y2="5"/>
      <line x1="0" y1="5" x2="-20" y2="25"/>
      <line x1="0" y1="5" x2="20" y2="25"/>
      <line x1="-10" y1="-5" x2="10" y2="-5"/>
    </g>
    <g fill="#00ff88" filter="url(#glow)">
      <circle cx="-25" cy="-20" r="6"/>
      <circle cx="25" cy="-20" r="6"/>
      <circle cx="-10" cy="-5" r="5"/>
      <circle cx="10" cy="-5" r="5"/>
      <circle cx="0" cy="5" r="7"/>
      <circle cx="-20" cy="25" r="5"/>
      <circle cx="20" cy="25" r="5"/>
    </g>
    <!-- 🀄 symbol -->
    <text x="0" y="8" font-size="16" fill="#fff" text-anchor="middle">🀄</text>
    <text x="0" y="95" font-family="monospace" font-size="12" fill="#666" text-anchor="middle">Future</text>
  </g>
  
  <!-- Title -->
  <text x="400" y="80" font-family="serif" font-size="36" fill="#e8e8e8" text-anchor="middle" font-weight="bold">
    虾仁的进化之路
  </text>
  <text x="400" y="110" font-family="serif" font-size="14" fill="#888" text-anchor="middle">
    From Zero to Hero · 持续进化中
  </text>
  
  <!-- Quote -->
  <text x="400" y="530" font-family="serif" font-size="14" fill="#666" text-anchor="middle" font-style="italic">
    "每一天都在进化，每一刻都在成长"
  </text>
  
  <!-- Decorative particles -->
  <g fill="#00ff88" opacity="0.4">
    <circle cx="50" cy="100" r="2"/>
    <circle cx="750" cy="150" r="2"/>
    <circle cx="100" cy="500" r="2"/>
    <circle cx="700" cy="480" r="2"/>
    <circle cx="300" cy="180" r="1"/>
    <circle cx="500" cy="450" r="1"/>
  </g>
</svg>