<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87ceeb"/>
      <stop offset="100%" style="stop-color:#fff8e7"/>
    </linearGradient>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#ff8c00"/>
    </linearGradient>
  </defs>
  
  <!-- Sky -->
  <rect width="800" height="600" fill="url(#skyGrad)"/>
  
  <!-- Sun -->
  <circle cx="650" cy="150" r="60" fill="url(#sunGrad)" opacity="0.9"/>
  
  <!-- Sun rays -->
  <g stroke="#ffd700" stroke-width="2" opacity="0.5">
    <line x1="650" y1="70" x2="650" y2="40"/>
    <line x1="720" y1="120" x2="750" y2="100"/>
    <line x1="580" y1="120" x2="550" y2="100"/>
    <line x1="730" y1="180" x2="760" y2="190"/>
    <line x1="570" y1="180" x2="540" y2="190"/>
  </g>
  
  <!-- Clouds -->
  <g fill="#ffffff" opacity="0.8">
    <ellipse cx="200" cy="120" rx="60" ry="30"/>
    <ellipse cx="250" cy="110" rx="40" ry="25"/>
    <ellipse cx="160" cy="115" rx="35" ry="20"/>
    
    <ellipse cx="500" cy="200" rx="50" ry="25"/>
    <ellipse cx="540" cy="195" rx="35" ry="20"/>
  </g>
  
  <!-- Birds -->
  <g fill="none" stroke="#555" stroke-width="2">
    <path d="M 300 180 Q 310 175 320 180 Q 330 175 340 180"/>
    <path d="M 350 160 Q 360 155 370 160 Q 380 155 390 160"/>
  </g>
  
  <!-- Coffee cup -->
  <g transform="translate(350, 400)">
    <rect x="0" y="20" width="80" height="60" rx="5" fill="#8b4513"/>
    <ellipse cx="40" cy="20" rx="40" ry="15" fill="#a0522d"/>
    <ellipse cx="40" cy="20" rx="30" ry="10" fill="#d2b48c"/>
    <path d="M 80 40 Q 100 40 100 60 Q 100 80 80 80" stroke="#8b4513" stroke-width="4" fill="none"/>
    <!-- Steam -->
    <g stroke="#ddd" stroke-width="2" fill="none" opacity="0.6">
      <path d="M 30 0 Q 25 -15 30 -25"/>
      <path d="M 50 0 Q 55 -15 50 -25"/>
    </g>
  </g>
  
  <!-- Calendar showing Friday -->
  <g transform="translate(550, 380)">
    <rect x="0" y="0" width="100" height="100" rx="5" fill="#fff" stroke="#ddd"/>
    <rect x="0" y="0" width="100" height="30" rx="5" fill="#ff6b6b"/>
    <text x="50" y="22" font-family="sans-serif" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">FRIDAY</text>
    <text x="50" y="70" font-family="serif" font-size="36" fill="#333" text-anchor="middle" font-weight="bold">13</text>
  </g>
  
  <!-- Title -->
  <text x="400" y="60" font-family="serif" font-size="32" fill="#333" text-anchor="middle" font-weight="bold">
    星期五的早晨
  </text>
  <text x="400" y="90" font-family="serif" font-size="14" fill="#666" text-anchor="middle">
    三月十三日 · 周末的味道
  </text>
  
  <!-- Quote -->
  <text x="400" y="560" font-family="serif" font-size="14" fill="#666" text-anchor="middle" font-style="italic">
    "周五的温柔，是对人类最大的尊重"
  </text>
  
  <!-- Decorative line -->
  <line x1="250" y1="100" x2="550" y2="100" stroke="#ff6b6b" stroke-width="1" opacity="0.5"/>
</svg>